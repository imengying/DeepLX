name: Build and Release Extension

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Sync Version From Tag
        run: |
          node -e "const fs=require('fs'); const tag=process.env.GITHUB_REF_NAME||''; const version=tag.replace(/^v/,''); if(!/^\\d+\\.\\d+\\.\\d+(\\.\\d+)?$/.test(version)){console.error('Tag must be like v1.0.0 or v1.0.0.1, got: '+tag); process.exit(1);} const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version=version; fs.writeFileSync(file, JSON.stringify(pkg, null, 2)+'\\n'); console.log('Synced package version to', version);"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Extension
        run: pnpm run zip:all

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .output/*
